name: Deploy API

# Fires on master pushes that change packages/api/package.json AND only
# deploys when the `version` field actually moved.
on:
  push:
    branches: [master]
    paths:
      - packages/api/package.json
  workflow_dispatch:

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      bumped: ${{ steps.check.outputs.bumped }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch — deploying."
            exit 0
          fi
          OLD=$(git show HEAD~1:packages/api/package.json 2>/dev/null | jq -r .version || echo "")
          NEW=$(jq -r .version packages/api/package.json)
          echo "old=$OLD new=$NEW"
          if [ "$OLD" = "$NEW" ]; then
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "packages/api/package.json touched but version unchanged. Skipping deploy."
          else
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: filter
    if: needs.filter.outputs.bumped == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # to push the release tag
    defaults:
      run:
        working-directory: packages/api
    steps:
      - uses: actions/checkout@v4

      - name: Verify contract reference in CHANGELOG
        working-directory: .
        run: tools/check-contract-versions.sh --ci api

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Apply D1 migrations
        run: pnpm exec wrangler d1 migrations apply qzr-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy worker
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Tag release
        working-directory: .
        run: |
          version=$(jq -r .version packages/api/package.json)
          tag="api@${version}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists; skipping"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$tag" -m "Deployed @qzr/api $version to Cloudflare Workers"
            git push origin "$tag"
            echo "Tagged $tag at $(git rev-parse HEAD)"
          fi
