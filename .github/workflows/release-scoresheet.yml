name: Release scoresheet

# Fires on master pushes that change apps/scoresheet/package.json AND only
# releases when the `version` field actually moved. `workflow_dispatch` is
# the manual escape hatch.
#
# A scoresheet release ships through two channels:
#   1. Native desktop (Tauri matrix: linux/windows/macos) + Android APK
#      → drafts a GitHub release
#   2. PWA bundle inside the web Pages site (apps/web/dist/scoresheet/)
#      → redeploys Cloudflare Pages so the live scoring tool at
#        www.versevault.ca/scoresheet/ matches the desktop version
#
# A `create-release` job runs serially before the artefact jobs to
# pre-create the draft GitHub release + `scoresheet@x.y.z` tag.
# Without it, the desktop matrix (3 jobs) and android (1 job) would
# all race to be the first to create the release via tauri-action /
# softprops/action-gh-release, producing duplicate drafts or 422s.
# Once the draft exists, the desktop matrix uploads by `releaseId`
# and android uploads by `tag_name` — both idempotent against the
# existing release.
on:
  push:
    branches: [master]
    paths:
      - apps/scoresheet/package.json
  workflow_dispatch:

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      bumped: ${{ steps.check.outputs.bumped }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch — releasing."
            exit 0
          fi
          OLD=$(git show HEAD~1:apps/scoresheet/package.json 2>/dev/null | jq -r .version || echo "")
          NEW=$(jq -r .version apps/scoresheet/package.json)
          echo "old=$OLD new=$NEW"
          if [ "$OLD" = "$NEW" ]; then
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "apps/scoresheet/package.json touched but version unchanged. Skipping release."
          else
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          fi

  verify-contract:
    needs: filter
    if: needs.filter.outputs.bumped == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify contract reference in CHANGELOG
        run: tools/check-contract-versions.sh --ci scoresheet

  create-release:
    needs: [filter, verify-contract]
    if: needs.filter.outputs.bumped == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.ver.outputs.v }}
      release-id: ${{ steps.create.outputs.id }}
    steps:
      - uses: actions/checkout@v4

      - id: ver
        run: echo "v=$(jq -r .version apps/scoresheet/package.json)" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          tag_name: scoresheet@${{ steps.ver.outputs.v }}
          name: scoresheet@${{ steps.ver.outputs.v }}
          draft: true
          body: 'See [apps/scoresheet/CHANGELOG.md](https://github.com/${{ github.repository }}/blob/master/apps/scoresheet/CHANGELOG.md) for details.'

  pwa:
    needs: [filter, verify-contract]
    if: needs.filter.outputs.bumped == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # build:all bundles the new scoresheet PWA into apps/web/dist/scoresheet/
      # alongside the current portal build.
      - run: pnpm build:all

      - name: Publish to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm dlx wrangler pages deploy apps/web/dist \
            --project-name=versevault-www --branch=master

  android:
    needs: [filter, verify-contract, create-release]
    if: needs.filter.outputs.bumped == 'true'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android targets
        run: |
          sdkmanager "platforms;android-36" "build-tools;35.0.0" "ndk;29.0.14206865"

      - run: pnpm install --frozen-lockfile

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > /tmp/qzr-release.keystore

      - name: Build APK
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/29.0.14206865
          ANDROID_KEYSTORE_PATH: /tmp/qzr-release.keystore
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: pnpm android:build

      # Upload into the draft release created by `create-release`. No
      # `name` / `draft` / `body` here — those come from the existing
      # release so they aren't fought over.
      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: scoresheet@${{ needs.create-release.outputs.version }}
          files: apps/scoresheet/src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release*.apk

  desktop:
    needs: [filter, verify-contract, create-release]
    if: needs.filter.outputs.bumped == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: pnpm install --frozen-lockfile

      # Upload into the draft release created by `create-release` via
      # releaseId — sidesteps tauri-action's "create if missing" path
      # so the three matrix legs don't race on release creation.
      - name: Build and upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release-id }}
          projectPath: apps/scoresheet
          args: --target ${{ matrix.target }}
