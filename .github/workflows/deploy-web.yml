name: Deploy web portal

# Fires on master pushes that change apps/web/package.json AND only deploys
# when the `version` field actually moved. `workflow_dispatch` is the
# manual escape hatch.
#
# Scoresheet PWA bumps (apps/scoresheet/package.json) trigger
# release-scoresheet.yml instead, which separately handles the Pages
# rebuild + PWA bundle swap.
on:
  push:
    branches: [master]
    paths:
      - apps/web/package.json
  workflow_dispatch:

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      bumped: ${{ steps.check.outputs.bumped }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch — deploying."
            exit 0
          fi
          OLD=$(git show HEAD~1:apps/web/package.json 2>/dev/null | jq -r .version || echo "")
          NEW=$(jq -r .version apps/web/package.json)
          echo "old=$OLD new=$NEW"
          if [ "$OLD" = "$NEW" ]; then
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "apps/web/package.json touched but version unchanged. Skipping deploy."
          else
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: filter
    if: needs.filter.outputs.bumped == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # to push the release tag
    steps:
      - uses: actions/checkout@v4

      # Fail fast if the web CHANGELOG entry for the version being deployed
      # doesn't reference the current @qzr/shared version.
      - name: Verify contract reference in CHANGELOG
        run: tools/check-contract-versions.sh --ci web

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # build:all bundles the current scoresheet PWA under apps/web/dist/scoresheet/
      # alongside the portal. Web bumps redeploy with whatever the latest
      # scoresheet build looks like.
      - run: pnpm build:all

      - name: Publish to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm dlx wrangler pages deploy apps/web/dist \
            --project-name=versevault-www --branch=master

      # Tag both the consumer (web) and the contract package (shared).
      # The shared tag is idempotent across the three deploy workflows —
      # whichever consumer deploy runs first wins, the others no-op.
      - name: Tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          web_v=$(jq -r .version apps/web/package.json)
          shared_v=$(jq -r .version packages/shared/package.json)
          tools/tag-if-missing.sh "web@${web_v}" "Deployed @qzr/web ${web_v} to Cloudflare Pages"
          tools/tag-if-missing.sh "shared@${shared_v}" "Bundled @qzr/shared ${shared_v} (shipped with web@${web_v})"
